<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>H3LL Music Player</title>
<link rel="icon" href="assets/pink/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pk:#d4607a;--pk2:#f4a7b9;--pk3:#fce8ee;--pk4:#fdf6f8;--tx:#4a2535;--tx2:#8a6070;}
body{font-family:'Nunito',sans-serif;background:#18091f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 10px 28px;flex-direction:column;}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d,2s) var(--dl,0s) infinite;}
@keyframes tw{0%,100%{opacity:.1;}50%{opacity:.85;}}

/* WINDOW */
.win{position:relative;z-index:2;width:400px;max-width:95vw;background:var(--pk4);border:2.5px solid var(--pk2);border-radius:14px;box-shadow:4px 4px 0 var(--pk),0 0 0 1px rgba(255,255,255,.12),0 16px 48px rgba(180,60,100,.4);margin-top:30px;}

/* BOW */
.bow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:64px;height:30px;z-index:10;}
.bwl,.bwr{position:absolute;top:4px;width:26px;height:20px;background:var(--pk2);border:2px solid var(--pk);}
.bwl{left:0;border-radius:50% 30% 50% 30%;transform:rotate(-22deg);transform-origin:right center;}
.bwr{right:0;border-radius:30% 50% 30% 50%;transform:rotate(22deg);transform-origin:left center;}
.bwc{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--pk);border:2px solid #fff;}
.bwrl,.bwrr{position:absolute;bottom:-6px;width:9px;height:12px;background:var(--pk2);border-radius:0 0 5px 5px;}
.bwrl{left:50%;margin-left:-6px;transform:rotate(-12deg);}
.bwrr{left:50%;margin-left:1px;transform:rotate(12deg);}

/* HEARTS */
.ch{position:absolute;font-size:15px;color:var(--pk2);}
.ch.tl{top:-2px;left:8px;}.ch.tr{top:-2px;right:8px;}
.ch.bl{bottom:-2px;left:8px;}.ch.br{bottom:-2px;right:8px;}
.ch.ml{top:50%;left:-5px;transform:translateY(-50%);}
.ch.mr{top:50%;right:-5px;transform:translateY(-50%);}

/* TITLEBAR */
.tbar{background:var(--pk3);border-radius:12px 12px 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--pk2);}
.ttx{font-family:'Caveat',cursive;font-size:19px;color:var(--tx);}
.wbtns{display:flex;gap:4px;align-items:center;position:relative;}

/* Window control buttons using images */
.winb-img{width:22px;height:22px;cursor:pointer;object-fit:contain;transition:transform .15s;}
.winb-img:hover{transform:scale(1.15);}
.gbtn-img{width:22px;height:22px;cursor:pointer;object-fit:contain;transition:transform .35s;border:none;background:none;padding:0;}
.gbtn-img:hover{transform:rotate(90deg);}

/* SETTINGS */
.spanel{position:absolute;top:34px;right:0;z-index:999;width:215px;background:#1a0c2a;color:#fff;border-radius:10px;padding:14px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);max-height:78vh;overflow-y:auto;}
.spanel.open{display:block;}
.spanel::-webkit-scrollbar{width:3px;}
.spanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);}
.sh4{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:lowercase;margin:10px 0 6px;}
.sh4:first-child{margin-top:0;}
.srow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.sbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:5px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.sbtn:hover,.sbtn.on{background:var(--pk);border-color:var(--pk);}
.spl{max-height:130px;overflow-y:auto;}
.spl::-webkit-scrollbar{width:3px;}
.spl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.spi{padding:5px 6px;border-radius:5px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.6);display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden;transition:background .1s;}
.spi:hover{background:rgba(255,255,255,.07);}
.spi.on{background:rgba(212,96,122,.28);color:#fff;}
.snum{color:rgba(255,255,255,.22);min-width:14px;font-size:10px;}
.stx{flex:1;overflow:hidden;text-overflow:ellipsis;}
.seq{color:var(--pk2);animation:tw .5s steps(2) infinite;}

/* Lyrics */
.lbox{background:rgba(0,0,0,.28);border-radius:7px;padding:10px;max-height:160px;overflow-y:auto;font-size:11px;line-height:1.9;color:rgba(255,255,255,.72);white-space:pre-wrap;font-family:'Nunito',sans-serif;}
.lbox::-webkit-scrollbar{width:3px;}
.lbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.ltitle{font-size:12px;color:var(--pk2);font-weight:700;margin-bottom:5px;}

/* SCENE */
.scene{position:relative;width:100%;border-bottom:2px solid var(--pk2);overflow:hidden;background:#2e1838;height:200px;display:flex;align-items:center;justify-content:center;transition:background 0.4s;}
/* Pink: record player — centred, natural size, transparent bg */
.scene-img{display:block;max-height:180px;max-width:88%;object-fit:contain;opacity:1;transition:opacity 0.3s ease;}
/* Blue/purple: portrait card — narrower */
.scene-img.frame-mode{max-height:190px;max-width:50%;}

/* BOTTOM */
.bpanel{background:var(--pk4);padding:14px 16px 16px;border-radius:0 0 12px 12px;position:relative;}
.bch-tl{position:absolute;top:7px;left:9px;font-size:13px;color:var(--pk2);opacity:.65;}
.bch-tr{position:absolute;top:7px;right:9px;font-size:13px;color:var(--pk2);opacity:.65;}

/* NOW PLAYING — album frame image */
.nprow{display:flex;align-items:center;gap:11px;margin-bottom:13px;padding-top:4px;}
.aart{width:58px;height:58px;flex-shrink:0;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;background:var(--pk3);}
.aart-frame{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:2;pointer-events:none;}
.aart-inner{width:100%;height:100%;object-fit:cover;z-index:1;display:block;}
.tdet{flex:1;overflow:hidden;}
.npl{font-family:'Caveat',cursive;font-size:13px;color:var(--tx2);font-style:italic;}
.tnw{overflow:hidden;}
.tnm{font-family:'Caveat',cursive;font-size:23px;font-weight:700;color:var(--tx);white-space:nowrap;display:inline-block;}
.tnm.mq{animation:mq 10s linear infinite;}
@keyframes mq{0%{transform:translateX(110%);}100%{transform:translateX(-110%);}}
.tart{font-size:12px;color:var(--tx2);margin-top:1px;}

/* CONTROLS — image buttons */
.ctrls{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:13px;}
.cbtn-img{width:52px;height:40px;object-fit:contain;cursor:pointer;transition:transform .12s,filter .12s;}
.cbtn-img:hover{transform:translateY(-2px);filter:brightness(1.15);}
.cbtn-img:active{transform:translateY(2px);filter:brightness(.9);}
.cbtn-img.play{width:60px;height:44px;}

/* PROGRESS — image progress bar */
.prog{margin-bottom:11px;}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.pstar-img{width:22px;height:22px;object-fit:contain;flex-shrink:0;cursor:pointer;transition:transform .2s;}
.pstar-img:hover{transform:scale(1.2);}
.pbar-wrap{flex:1;position:relative;height:20px;display:flex;align-items:center;}
.pbar-bg{position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:14px;object-fit:fill;pointer-events:none;border-radius:4px;}
.pbar{flex:1;height:14px;background:transparent;border-radius:4px;cursor:pointer;position:relative;user-select:none;}
.pfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:4px;width:0%;pointer-events:none;position:relative;opacity:.7;}
.pthumb{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:15px;height:15px;background:var(--pk);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(212,96,122,.6);cursor:grab;}
.trow{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);font-family:monospace;padding:0 3px;}

/* VOLUME — image volume bar */
.volwrap{margin-bottom:12px;}
.voltop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vollbl{font-size:11px;color:var(--tx2);font-weight:600;letter-spacing:.5px;}
.volnum{font-size:11px;color:var(--pk);font-weight:700;font-family:monospace;background:rgba(212,96,122,.1);border:1px solid var(--pk2);border-radius:10px;padding:1px 8px;}
.voltrack{position:relative;height:22px;display:flex;align-items:center;}
.volempty{flex:1;height:14px;background:transparent;border-radius:3px;position:relative;cursor:pointer;}
.vol-bg{position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:14px;object-fit:fill;pointer-events:none;border-radius:3px;}
.volfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:3px;width:80%;pointer-events:none;opacity:.7;}
.volthumb{position:absolute;top:50%;transform:translateY(-50%);width:18px;height:18px;background:var(--pk);border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(212,96,122,.55);cursor:grab;left:calc(80% - 9px);}
.volthumb:hover{transform:translateY(-50%) scale(1.15);}
.volicons{display:flex;justify-content:space-between;align-items:center;margin-top:5px;padding:0 1px;}
.volic-img{width:24px;height:24px;object-fit:contain;cursor:pointer;transition:transform .15s,filter .15s;opacity:.75;}
.volic-img:hover{transform:scale(1.15);opacity:1;}
/* fallback emoji icons for extra vol buttons */
.volic{font-size:16px;cursor:pointer;color:var(--tx2);transition:all .15s;padding:2px 4px;border-radius:4px;}
.volic:hover{color:var(--pk);background:rgba(212,96,122,.1);}

/* HEART */
.bhrow{display:flex;justify-content:center;margin-top:4px;}
.bigh{font-size:28px;color:var(--pk);cursor:pointer;transition:all .2s;filter:drop-shadow(0 2px 8px rgba(212,96,122,.5));line-height:1;}
.bigh:hover{transform:scale(1.18);}

/* shuffle / repeat row */
.extra-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:10px;}
.extra-btn{width:28px;height:28px;object-fit:contain;cursor:pointer;opacity:.6;transition:opacity .15s,transform .15s;}
.extra-btn:hover{opacity:1;transform:scale(1.12);}
.extra-btn.on{opacity:1;filter:drop-shadow(0 0 4px var(--pk));}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="win">
  <div class="bow"><div class="bwl"></div><div class="bwr"></div><div class="bwc"></div><div class="bwrl"></div><div class="bwrr"></div></div>
  <div class="ch tl">♥</div><div class="ch tr">♥</div>
  <div class="ch bl">♥</div><div class="ch br">♥</div>
  <div class="ch ml">♥</div><div class="ch mr">♥</div>

  <div class="tbar">
    <span class="ttx">h3ll player</span>
    <div class="wbtns">
      <!-- Settings button uses settings.png -->
      <button class="gbtn-img" onclick="togS()" title="Settings" style="background:none;border:none;cursor:pointer;">
        <img id="SETBTN" src="assets/pink/settings.png" alt="settings" style="width:22px;height:22px;object-fit:contain;transition:transform .35s;" onmouseover="this.style.transform='rotate(90deg)'" onmouseout="this.style.transform='rotate(0deg)'"/>
      </button>
      <!-- Window buttons: minimize, maximize, exit -->
      <img id="MINBTN" class="winb-img" src="assets/pink/minimizer_button.png" alt="minimize" title="Minimize"/>
      <img id="WINBTN" class="winb-img" src="assets/pink/window_button.png" alt="maximize" title="Maximize"/>
      <img id="EXITBTN" class="winb-img" src="assets/pink/exit_button.png" alt="close" title="Close"/>

      <div class="spanel" id="spanel">
        <div class="sh4">theme</div>
        <div class="srow">
          <button class="sbtn on" id="btnPk" onclick="setTheme('pink')">pink</button>
          <button class="sbtn" id="btnBl" onclick="setTheme('blue')">blue</button>
          <button class="sbtn" id="btnPu" onclick="setTheme('purple')">purple</button>
        </div>
        <div class="sh4">playlist</div>
        <div class="spl" id="spl"></div>
        <div class="sh4">🎵 lyrics</div>
        <div class="ltitle" id="ltitle">—</div>
        <div class="lbox" id="lbox">Select a song to see lyrics.</div>
      </div>
    </div>
  </div>

  <!-- SCENE: uses record_player.png for pink, frame.png for blue/purple -->
  <div class="scene" id="SCENE">
    <img id="SCENE_IMG" class="scene-img" src="assets/pink/record_player.png"
         style="opacity:1;transition:opacity 0.3s;"
         alt="player scene"/>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bpanel">
    <div class="bch-tl">♥</div><div class="bch-tr">♥</div>

    <!-- NOW PLAYING: album_frame.png as overlay frame -->
    <div class="nprow">
      <div class="aart" id="AART">
        <span id="AART_FALLBACK" style="font-size:24px;z-index:1;">♪</span>
        <img id="AART_FRAME" class="aart-frame" src="assets/pink/album_frame.png" alt="" onerror="this.style.display='none'"/>
      </div>
      <div class="tdet">
        <div class="npl">now playing...</div>
        <div class="tnw"><span class="tnm" id="TNAME">select a song</span></div>
        <div class="tart" id="TART">tap ⚙ to browse</div>
      </div>
    </div>

    <!-- SHUFFLE / REPEAT -->
    <div class="extra-row">
      <img id="SHUF" class="extra-btn" src="assets/pink/shuffle_button.png" alt="shuffle" title="Shuffle" onclick="togShuffle()" onerror="this.style.display='none'"/>
      <img id="REP"  class="extra-btn" src="assets/pink/repeat_button.png"  alt="repeat"  title="Repeat"  onclick="togRepeat()"  onerror="this.style.display='none'"/>
    </div>

    <!-- CONTROLS: backwards, play/pause, forwards -->
    <div class="ctrls">
      <img class="cbtn-img" src="assets/pink/backwards_button.png" alt="prev" onclick="prevT()" onerror="this.outerHTML='<button class=\'cbtn\' onclick=\'prevT()\'>◄◄</button>'"/>
      <img class="cbtn-img play" id="PBTN_IMG" src="assets/pink/play_button.png" alt="play/pause" onclick="togPlay()" onerror="this.outerHTML='<button class=\'cbtn play\' id=\'PBTN\' onclick=\'togPlay()\'>▶</button>'"/>
      <img class="cbtn-img" src="assets/pink/forwards_button.png" alt="next" onclick="nextT()" onerror="this.outerHTML='<button class=\'cbtn\' onclick=\'nextT()\'>▶▶</button>'"/>
    </div>

    <!-- PROGRESS BAR: progress_bar.png as background, star.png as icon -->
    <div class="prog">
      <div class="prow">
        <img id="STAR_IMG" class="pstar-img" src="assets/pink/progress_bar.png"
             style="width:22px;height:22px;border-radius:50%;object-fit:cover;"
             onerror="this.outerHTML='<span class=\'pstar\'>⭐</span>'" alt="star" onclick="togLike()"/>
        <div class="pbar-wrap">
          <img class="pbar-bg" id="PBAR_BG" src="assets/pink/progress_bar.png" alt="" onerror="this.style.display='none'"/>
          <div class="pbar" id="PBAR">
            <div class="pfill" id="PFILL">
              <div class="pthumb" id="PTHMB"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="trow"><span id="CT">0:00</span><span id="TT">0:00</span></div>
    </div>

    <!-- VOLUME: volume_bar images + mute/volume buttons -->
    <div class="volwrap">
      <div class="voltop">
        <span class="vollbl">🎵 VOLUME</span>
        <span class="volnum" id="VOLNUM">80%</span>
      </div>
      <div class="voltrack">
        <div class="volempty" id="VBAR" onclick="volClick(event)">
          <img class="vol-bg" id="VBAR_BG" src="assets/pink/volume_bar_low.png" alt="" onerror="this.style.display='none'"/>
          <div class="volfill" id="VFILL"></div>
        </div>
        <div class="volthumb" id="VTHMB"></div>
      </div>
      <div class="volicons">
        <img class="volic-img" id="MUTE_BTN" src="assets/pink/mute_button.png" alt="mute" onclick="setVol(0)" onerror="this.outerHTML='<span class=\'volic\' onclick=\'setVol(0)\'>🔇</span>'"/>
        <img class="volic-img" src="assets/pink/volume_bar_low.png" alt="vol down" onclick="setVol(Math.max(0,curVol-10))" style="width:28px;" onerror="this.outerHTML='<span class=\'volic\' onclick=\'setVol(Math.max(0,curVol-10))\'>🔉</span>'"/>
        <img class="volic-img" src="assets/pink/volume_bar_high.png" alt="vol up" onclick="setVol(Math.min(100,curVol+10))" style="width:28px;" onerror="this.outerHTML='<span class=\'volic\' onclick=\'setVol(Math.min(100,curVol+10))\'>🔊</span>'"/>
        <img class="volic-img" src="assets/pink/volume_button.png" alt="max" onclick="setVol(100)" onerror="this.outerHTML='<span class=\'volic\' onclick=\'setVol(100)\'>📢</span>'"/>
      </div>
    </div>

    <div class="bhrow"><div class="bigh" id="BIGH" onclick="togLike()">♥</div></div>
  </div>
</div>

<audio id="AUD"></audio>

<script>
// Stars
(()=>{
  const c=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');s.className='star';
    const z=(Math.random()*2+.5).toFixed(1);
    s.style.cssText=`width:${z}px;height:${z}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--d:${(1.5+Math.random()*2.5).toFixed(1)}s;--dl:${(Math.random()*3).toFixed(1)}s`;
    c.appendChild(s);
  }
})();

   lyrics:"Hu mane sodhya karu\nPan hu tane paamya karu\nTu lai ne Aave laagni no melo re\n\nVahalam... Aavo ne Aavo ne"},
  {title:"Tu Hi Haqeeqat",
   artist:"Javed Ali & Pritam",
   file:"audio/Tu_Hi_Haqeeqat_-_Lyrical_Song___Tum_Mile___Emraan_Hashmi___Soha_Ali_Khan___Javed_Ali___Pritam_256k_.mp3",
   color:"pink",
   lyrics:"Tu hi haqeeqat, baaki sab sapne\nMujhe hai teri zaroorat\nTu hi haqeeqat, baaki sab sapne"},
  {title:"Tu Hi Haqeeqat (Lyric)",
   artist:"Javed Ali & Pritam",
   file:"audio/Tu_Hi_Haqeeqat_Lyric_Video_-_Tum_Mile_Emraan_Hashmi_Soha_Ali_Khan_Pritam_Javed_Ali_Shadab_256k_.mp3",
   color:"blue",
   lyrics:"Tu hi haqeeqat, baaki sab sapne\nMujhe hai teri zaroorat\nTu hi haqeeqat, baaki sab sapne"},
  {title:"Zara Sa",
   artist:"KK & Pritam",
   file:"audio/Zara_Sa_-_Full_Video___Jannat___Emraan_Hashmi__Sonal___KK___Pritam___Sayeed_Quadri___Mahesh_Bhatt_256k_.mp3",
   color:"purple",
   lyrics:"Zara sa jhoom loon main\nAaj pehli baar dil ne\nYeh kaha hai\n\nHaan maine dil diya\nUsne dil liya"},
  {title:"Ye Tune Kya Kiya",
   artist:"Shreya Ghoshal & Pritam",
   file:"audio/Ye_Tune_Kya_Kiya_Song_Once_Upon_A_Time_In_Mumbaai_Dobara___Pritam___Akshay_Kumar__Sonakshi_Sinha_256k_.mp3",
   color:"pink",
   lyrics:"Ye tune kya kiya\nJaane kab se dil mein tu samaa gayi\nYe tune kya kiya"},
];

const COLORS={
  pink:  {pk:"#d4607a",pk2:"#f4a7b9",pk3:"#fce8ee",pk4:"#fdf6f8",folder:"pink"},
  blue:  {pk:"#5878d0",pk2:"#98b8f0",pk3:"#dce8fc",pk4:"#f0f4fd",folder:"blue"},
  purple:{pk:"#7858c0",pk2:"#b898f0",pk3:"#ece0fc",pk4:"#f5f0fd",folder:"blue"}, // purple uses blue assets
};

let cur=0,playing=false,liked=false,curVol=80,dragP=false,dragV=false;
let shuffleOn=false,repeatOn=false;
const aud=document.getElementById('AUD');
aud.volume=0.8;
const $=id=>document.getElementById(id);

function fmt(s){if(!s||isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;}

// Switch all theme images to correct folder
function applyC(key){
  const c=COLORS[key]||COLORS.pink;
  const r=document.documentElement.style;
  r.setProperty('--pk',c.pk);r.setProperty('--pk2',c.pk2);r.setProperty('--pk3',c.pk3);r.setProperty('--pk4',c.pk4);

  const f=c.folder;

  // Update all button images to theme folder
  const imgs={
    SETBTN:`assets/${f}/settings.png`,
    MINBTN:`assets/${f}/minimizer_button.png`,
    WINBTN:`assets/${f}/window_button.png`,
    EXITBTN:`assets/${f}/exit_button.png`,
    AART_FRAME:`assets/${f}/album_frame.png`,
    SHUF:`assets/${f}/shuffle_button.png`,
    REP:`assets/${f}/repeat_button.png`,
    PBAR_BG:`assets/${f}/progress_bar.png`,
    VBAR_BG:`assets/${f}/volume_bar_low.png`,
    MUTE_BTN:`assets/${f}/mute_button.png`,
    PBTN_IMG: playing ? `assets/${f}/pause_button.png` : `assets/${f}/play_button.png`,
  };
  for(const[id,src]of Object.entries(imgs)){const el=$(id);if(el&&el.tagName==='IMG')el.src=src;}

  // Update forward/back buttons (no IDs, select by alt text)
  document.querySelectorAll('.cbtn-img').forEach(img=>{
    if(img.alt==='prev') img.src=`assets/${f}/backwards_button.png`;
    if(img.alt==='next') img.src=`assets/${f}/forwards_button.png`;
  });
  document.querySelectorAll('.volic-img').forEach(img=>{
    if(img.alt==='vol down') img.src=`assets/${f}/volume_bar_low.png`;
    if(img.alt==='vol up')   img.src=`assets/${f}/volume_bar_high.png`;
    if(img.alt==='max')      img.src=`assets/${f}/volume_button.png`;
  });

  // Scene: pink=record_player (wide, transparent bg), blue/purple=frame (portrait card)
  const sceneImg=$('SCENE_IMG');
  const sceneEl=$('SCENE');
  if(sceneImg){
    if(f==='pink'){
      sceneImg.src='assets/pink/record_player.png';
      sceneImg.classList.remove('frame-mode');
      if(sceneEl) sceneEl.style.background='#2e1838';
    } else {
      sceneImg.src=`assets/${f}/frame.png`;
      sceneImg.classList.add('frame-mode');
      if(sceneEl) sceneEl.style.background='#0d1f2e';
    }
    sceneImg.style.opacity='0';
    sceneImg.onload = ()=>{ sceneImg.style.opacity='1'; };
    // If image already cached, onload won't fire — force it
    if(sceneImg.complete) sceneImg.style.opacity='1';
  }
}

function loadT(idx,auto=false){
  cur=((idx%TRACKS.length)+TRACKS.length)%TRACKS.length;
  const t=TRACKS[cur];
  applyC(t.color||'pink');

  const tn=$('TNAME');tn.textContent=t.title;tn.classList.toggle('mq',t.title.length>16);
  $('TART').textContent=t.artist;
  $('ltitle').textContent=t.title+' — '+t.artist;
  $('lbox').textContent=t.lyrics||'Lyrics not available.';
  $('PFILL').style.width='0%';$('CT').textContent='0:00';$('TT').textContent='0:00';

  // Use the file path directly — already URL-encoded where needed
  aud.src=t.file;
  aud.load();
  if(auto||playing){aud.play().then(()=>setPlay(true)).catch(e=>console.warn('Audio error:',e));}
  renderPL();
}

function setPlay(s){
  playing=s;
  const c=COLORS[TRACKS[cur].color||'pink'];
  const f=c.folder;
  const pb=$('PBTN_IMG');
  if(pb) pb.src=s?`assets/${f}/pause_button.png`:`assets/${f}/play_button.png`;
  renderPL();
}

function togPlay(){
  if(playing){aud.pause();setPlay(false);}
  else{
    if(!aud.src||aud.readyState===0){loadT(cur,true);return;}
    aud.play().then(()=>setPlay(true)).catch(e=>console.warn(e));
  }
}

function prevT(){loadT(cur-1,playing);}
function nextT(){loadT(cur+1,playing);}

function togShuffle(){
  shuffleOn=!shuffleOn;
  $('SHUF').classList.toggle('on',shuffleOn);
}
function togRepeat(){
  repeatOn=!repeatOn;
  aud.loop=repeatOn;
  $('REP').classList.toggle('on',repeatOn);
}

aud.addEventListener('timeupdate',()=>{
  if(dragP||!aud.duration)return;
  const p=(aud.currentTime/aud.duration)*100;
  $('PFILL').style.width=p+'%';$('CT').textContent=fmt(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>$('TT').textContent=fmt(aud.duration));
aud.addEventListener('error',()=>{
  const codes={1:'ABORTED',2:'NETWORK',3:'DECODE',4:'NOT_SUPPORTED'};
  const code=aud.error?aud.error.code:0;
  console.error(`❌ Audio failed [${codes[code]||code}]: ${aud.src}`);
  $('TART').textContent='⚠️ audio error — check console';
});
aud.addEventListener('ended',()=>{
  if(!repeatOn){
    if(shuffleOn){loadT(Math.floor(Math.random()*TRACKS.length),true);}
    else nextT();
  }
});

// Progress drag
const pb=$('PBAR');
function seekX(cx){if(!aud.duration)return;const r=pb.getBoundingClientRect();const p=Math.max(0,Math.min(1,(cx-r.left)/r.width));aud.currentTime=p*aud.duration;$('PFILL').style.width=(p*100)+'%';$('CT').textContent=fmt(aud.currentTime);}
pb.addEventListener('click',e=>{if(!dragP)seekX(e.clientX);});
$('PTHMB').addEventListener('mousedown',e=>{dragP=true;e.preventDefault();});
$('PTHMB').addEventListener('touchstart',()=>dragP=true,{passive:true});
document.addEventListener('mousemove',e=>{if(dragP)seekX(e.clientX);});
document.addEventListener('touchmove',e=>{if(dragP)seekX(e.touches[0].clientX);},{passive:true});
document.addEventListener('mouseup',()=>dragP=false);
document.addEventListener('touchend',()=>dragP=false);

// Volume
function setVol(v){
  curVol=Math.max(0,Math.min(100,Math.round(+v)));
  aud.volume=curVol/100;
  $('VOLNUM').textContent=curVol+'%';
  $('VFILL').style.width=curVol+'%';
  $('VTHMB').style.left=`calc(${curVol}% - 9px)`;
  // swap volume bar image
  const c=COLORS[TRACKS[cur].color||'pink'];
  const vbg=$('VBAR_BG');
  if(vbg) vbg.src=`assets/${c.folder}/${curVol>50?'volume_bar_high':'volume_bar_low'}.png`;
}
function volClick(e){const r=$('VBAR').getBoundingClientRect();setVol(((e.clientX-r.left)/r.width)*100);}
$('VTHMB').addEventListener('mousedown',e=>{dragV=true;e.preventDefault();});
$('VTHMB').addEventListener('touchstart',()=>dragV=true,{passive:true});
document.addEventListener('mousemove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.clientX-r.left)/r.width)*100);});
document.addEventListener('touchmove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.touches[0].clientX-r.left)/r.width)*100);},{passive:true});
document.addEventListener('mouseup',()=>dragV=false);
document.addEventListener('touchend',()=>dragV=false);

function togLike(){
  liked=!liked;
  const b=$('BIGH');
  b.style.color=liked?'#ff2266':'var(--pk)';
  b.style.transform=liked?'scale(1.3) rotate(-10deg)':'scale(1)';
  // pulse animation
  b.style.transition='all .2s';
}

function togS(){$('spanel').classList.toggle('open');renderPL();}
document.addEventListener('click',e=>{if(!e.target.closest('.wbtns'))$('spanel').classList.remove('open');});

function setTheme(t){
  $('btnPk').classList.toggle('on',t==='pink');
  $('btnBl').classList.toggle('on',t==='blue');
  $('btnPu').classList.toggle('on',t==='purple');
  // re-apply current track color with new theme preference
  applyC(t);
}

function renderPL(){
  const el=$('spl');el.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='spi'+(i===cur?' on':'');
    d.innerHTML=`<span class="snum">${i+1}</span><span class="stx">${t.title}</span>${i===cur&&playing?'<span class="seq">♪</span>':''}`;
    d.onclick=()=>loadT(i,true);
    el.appendChild(d);
  });
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togPlay();}
  if(e.code==='ArrowRight')nextT();
  if(e.code==='ArrowLeft')prevT();
  if(e.code==='ArrowUp')setVol(curVol+10);
  if(e.code==='ArrowDown')setVol(curVol-10);
});

setVol(80);applyC('pink');loadT(0,false);renderPL();
</script>
</body>
</html>
