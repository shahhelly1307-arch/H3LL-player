<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>H3LL Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pk:#d4607a;--pk2:#f4a7b9;--pk3:#fce8ee;--pk4:#fdf6f8;--tx:#4a2535;--tx2:#8a6070;}
body{font-family:'Nunito',sans-serif;background:#18091f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 10px 28px;flex-direction:column;}
/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d,2s) var(--dl,0s) infinite;}
@keyframes tw{0%,100%{opacity:.1;}50%{opacity:.85;}}
/* WINDOW */
.win{position:relative;z-index:2;width:400px;max-width:95vw;background:var(--pk4);border:2.5px solid var(--pk2);border-radius:14px;box-shadow:4px 4px 0 var(--pk),0 0 0 1px rgba(255,255,255,.12),0 16px 48px rgba(180,60,100,.4);margin-top:30px;}
/* BOW */
.bow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:64px;height:30px;z-index:10;}
.bwl,.bwr{position:absolute;top:4px;width:26px;height:20px;background:var(--pk2);border:2px solid var(--pk);}
.bwl{left:0;border-radius:50% 30% 50% 30%;transform:rotate(-22deg);transform-origin:right center;}
.bwr{right:0;border-radius:30% 50% 30% 50%;transform:rotate(22deg);transform-origin:left center;}
.bwc{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--pk);border:2px solid #fff;}
.bwrl,.bwrr{position:absolute;bottom:-6px;width:9px;height:12px;background:var(--pk2);border-radius:0 0 5px 5px;}
.bwrl{left:50%;margin-left:-6px;transform:rotate(-12deg);}
.bwrr{left:50%;margin-left:1px;transform:rotate(12deg);}
/* HEARTS */
.ch{position:absolute;font-size:15px;color:var(--pk2);}
.ch.tl{top:-2px;left:8px;}.ch.tr{top:-2px;right:8px;}
.ch.bl{bottom:-2px;left:8px;}.ch.br{bottom:-2px;right:8px;}
.ch.ml{top:50%;left:-5px;transform:translateY(-50%);}
.ch.mr{top:50%;right:-5px;transform:translateY(-50%);}
/* TITLEBAR */
.tbar{background:var(--pk3);border-radius:12px 12px 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--pk2);}
.ttx{font-family:'Caveat',cursive;font-size:19px;color:var(--tx);}
.wbtns{display:flex;gap:4px;align-items:center;position:relative;}
.gbtn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--tx2);padding:2px 5px;transition:transform .35s;}
.gbtn:hover{transform:rotate(90deg);}
.winb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--pk2);background:var(--pk4);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--tx2);cursor:pointer;}
/* SETTINGS */
.spanel{position:absolute;top:34px;right:0;z-index:999;width:215px;background:#1a0c2a;color:#fff;border-radius:10px;padding:14px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);max-height:78vh;overflow-y:auto;}
.spanel.open{display:block;}
.spanel::-webkit-scrollbar{width:3px;}
.spanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);}
.sh4{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:lowercase;margin:10px 0 6px;}
.sh4:first-child{margin-top:0;}
.srow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.sbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:5px;padding:4px 12px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.sbtn:hover,.sbtn.on{background:var(--pk);border-color:var(--pk);}
.spl{max-height:130px;overflow-y:auto;}
.spl::-webkit-scrollbar{width:3px;}
.spl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.spi{padding:5px 6px;border-radius:5px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.6);display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden;transition:background .1s;}
.spi:hover{background:rgba(255,255,255,.07);}
.spi.on{background:rgba(212,96,122,.28);color:#fff;}
.snum{color:rgba(255,255,255,.22);min-width:14px;font-size:10px;}
.stx{flex:1;overflow:hidden;text-overflow:ellipsis;}
.seq{color:var(--pk2);animation:tw .5s steps(2) infinite;}
/* Lyrics */
.lbox{background:rgba(0,0,0,.28);border-radius:7px;padding:10px;max-height:160px;overflow-y:auto;font-size:11px;line-height:1.9;color:rgba(255,255,255,.72);white-space:pre-wrap;font-family:'Nunito',sans-serif;}
.lbox::-webkit-scrollbar{width:3px;}
.lbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.ltitle{font-size:12px;color:var(--pk2);font-weight:700;margin-bottom:5px;}
/* SCENE */
.scene{position:relative;width:100%;border-bottom:2px solid var(--pk2);overflow:hidden;}
.scene svg{display:block;width:100%;height:auto;}
@keyframes vsp{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
#VG{transform-origin:50% 50%;transform-box:fill-box;transition:opacity .3s;}
#VG.sp{animation:vsp 3.5s linear infinite;}
#TA{transform-origin:82% 20%;transform-box:fill-box;transition:transform .7s cubic-bezier(.4,0,.2,1);}
#TA.pl{transform:rotate(13deg);}
/* BOTTOM */
.bpanel{background:var(--pk4);padding:14px 16px 16px;border-radius:0 0 12px 12px;position:relative;}
.bch-tl{position:absolute;top:7px;left:9px;font-size:13px;color:var(--pk2);opacity:.65;}
.bch-tr{position:absolute;top:7px;right:9px;font-size:13px;color:var(--pk2);opacity:.65;}
/* NOW PLAYING */
.nprow{display:flex;align-items:center;gap:11px;margin-bottom:13px;padding-top:4px;}
.aart{width:58px;height:58px;flex-shrink:0;border-radius:8px;border:2px solid var(--pk2);background:var(--pk3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;}
.aart img{width:100%;height:100%;object-fit:cover;}
.tdet{flex:1;overflow:hidden;}
.npl{font-family:'Caveat',cursive;font-size:13px;color:var(--tx2);font-style:italic;}
.tnw{overflow:hidden;}
.tnm{font-family:'Caveat',cursive;font-size:23px;font-weight:700;color:var(--tx);white-space:nowrap;display:inline-block;}
.tnm.mq{animation:mq 10s linear infinite;}
@keyframes mq{0%{transform:translateX(110%);}100%{transform:translateX(-110%);}}
.tart{font-size:12px;color:var(--tx2);margin-top:1px;}
/* CONTROLS */
.ctrls{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:13px;}
.cbtn{background:var(--pk4);border:2px solid var(--pk2);border-radius:9px;width:60px;height:42px;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 var(--pk2),0 4px 10px rgba(180,60,100,.15);transition:all .12s;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;}
.cbtn:hover{background:var(--pk3);transform:translateY(-2px);}
.cbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--pk2);}
.cbtn.play{font-size:20px;}
/* PROGRESS */
.prog{margin-bottom:11px;}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.pstar{font-size:19px;flex-shrink:0;}
.pbar{flex:1;height:7px;background:rgba(212,96,122,.13);border:1.5px solid var(--pk2);border-radius:4px;cursor:pointer;position:relative;user-select:none;}
.pfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:4px;width:0%;pointer-events:none;position:relative;}
.pthumb{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:15px;height:15px;background:var(--pk);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(212,96,122,.6);cursor:grab;}
.trow{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);font-family:monospace;padding:0 3px;}
/* VOLUME */
.volwrap{margin-bottom:12px;}
.voltop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vollbl{font-size:11px;color:var(--tx2);font-weight:600;letter-spacing:.5px;}
.volnum{font-size:11px;color:var(--pk);font-weight:700;font-family:monospace;background:rgba(212,96,122,.1);border:1px solid var(--pk2);border-radius:10px;padding:1px 8px;}
.voltrack{position:relative;height:22px;display:flex;align-items:center;}
.volempty{flex:1;height:5px;background:rgba(212,96,122,.12);border:1.5px solid var(--pk2);border-radius:3px;position:relative;cursor:pointer;}
.volfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:3px;width:80%;pointer-events:none;}
.volthumb{position:absolute;top:50%;transform:translateY(-50%);width:18px;height:18px;background:var(--pk);border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(212,96,122,.55);cursor:grab;left:calc(80% - 9px);}
.volthumb:hover{transform:translateY(-50%) scale(1.15);}
.volicons{display:flex;justify-content:space-between;margin-top:5px;padding:0 1px;}
.volic{font-size:16px;cursor:pointer;color:var(--tx2);transition:all .15s;padding:2px 4px;border-radius:4px;}
.volic:hover{color:var(--pk);background:rgba(212,96,122,.1);}
/* HEART */
.bhrow{display:flex;justify-content:center;margin-top:4px;}
.bigh{font-size:28px;color:var(--pk);cursor:pointer;transition:all .2s;filter:drop-shadow(0 2px 8px rgba(212,96,122,.5));line-height:1;}
.bigh:hover{transform:scale(1.18);}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="win">
  <div class="bow"><div class="bwl"></div><div class="bwr"></div><div class="bwc"></div><div class="bwrl"></div><div class="bwrr"></div></div>
  <div class="ch tl">♥</div><div class="ch tr">♥</div>
  <div class="ch bl">♥</div><div class="ch br">♥</div>
  <div class="ch ml">♥</div><div class="ch mr">♥</div>

  <div class="tbar">
    <span class="ttx">h3ll player</span>
    <div class="wbtns">
      <button class="gbtn" onclick="togS()">⚙</button>
      <div class="winb">─</div><div class="winb" style="font-size:8px;">□</div><div class="winb">✕</div>
      <div class="spanel" id="spanel">
        <div class="sh4">theme</div>
        <div class="srow">
          <button class="sbtn on" id="btnPk" onclick="setTheme('pink')">pink</button>
          <button class="sbtn" id="btnBl" onclick="setTheme('blue')">blue</button>
          <button class="sbtn" id="btnPu" onclick="setTheme('purple')">purple</button>
        </div>
        <div class="sh4">playlist</div>
        <div class="spl" id="spl"></div>
        <div class="sh4">🎵 lyrics</div>
        <div class="ltitle" id="ltitle">—</div>
        <div class="lbox" id="lbox">Select a song to see lyrics.</div>
      </div>
    </div>

  <!-- SCENE -->

      <ellipse cx="369" cy="150" rx="10" ry="13" fill="#e8789a" id="T2" stroke="#c85878" stroke-width="1.2"/>
      <ellipse cx="387" cy="155" rx="9" ry="12" fill="#f4bece" id="T3" transform="rotate(12,387,155)" stroke="#e0789a" stroke-width="1.2"/>
      <path d="M351,196 Q347,218 351,228 L387,228 Q391,218 387,196 Z" fill="#887aaa" stroke="#9888bc" stroke-width="1.5"/>

      <line x1="62" y1="144" x2="74" y2="76" stroke="rgba(205,228,245,.38)" stroke-width="1"/>

  </div>

  <!-- BOTTOM PANEL -->
  <div class="bpanel">
    <div class="bch-tl">♥</div><div class="bch-tr">♥</div>
    <div class="nprow">
      <div class="aart" id="AART">♪</div>
      <div class="tdet">
        <div class="npl">now playing...</div>
        <div class="tnw"><span class="tnm" id="TNAME">select a song</span></div>
        <div class="tart" id="TART">tap ⚙ to browse</div>
      </div>
    </div>
    <div class="ctrls">
      <button class="cbtn" onclick="prevT()">◄◄</button>
      <button class="cbtn play" id="PBTN" onclick="togPlay()">▶</button>
      <button class="cbtn" onclick="nextT()">▶▶</button>
    </div>
    <div class="prog">
      <div class="prow">
        <span class="pstar">⭐</span>
        <div class="pbar" id="PBAR">
          <div class="pfill" id="PFILL">
            <div class="pthumb" id="PTHMB"></div>
          </div>
        </div>
      </div>
      <div class="trow"><span id="CT">0:00</span><span id="TT">0:00</span></div>
    </div>
    <!-- VOLUME -->
    <div class="volwrap">
      <div class="voltop">
        <span class="vollbl">🎵 VOLUME</span>
        <span class="volnum" id="VOLNUM">80%</span>
      </div>
      <div class="voltrack">
        <div class="volempty" id="VBAR" onclick="volClick(event)">
          <div class="volfill" id="VFILL"></div>
        </div>
        <div class="volthumb" id="VTHMB"></div>
      </div>
      <div class="volicons">
        <span class="volic" onclick="setVol(0)" title="Mute">🔇</span>

const COLORS={
  pink:  {pk:"#d4607a",pk2:"#f4a7b9",pk3:"#fce8ee",pk4:"#fdf6f8",vc:"#f4a7b9",nl:"#d4607a",t:["#f4a7b9","#e8789a","#f4bece"]},
  blue:  {pk:"#5878d0",pk2:"#98b8f0",pk3:"#dce8fc",pk4:"#f0f4fd",vc:"#98b8f0",nl:"#5878d0",t:["#98b8f0","#5878d0","#b8d0f8"]},
  purple:{pk:"#7858c0",pk2:"#b898f0",pk3:"#ece0fc",pk4:"#f5f0fd",vc:"#b898f0",nl:"#7858c0",t:["#b898f0","#7858c0","#ccb0f8"]},
};

let cur=0,playing=false,liked=false,curVol=80,dragP=false,dragV=false;
const aud=document.getElementById('AUD');
aud.volume=0.8;
const $=id=>document.getElementById(id);

function fmt(s){if(!s||isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;}

function applyC(key){
  const c=COLORS[key]||COLORS.pink;
  const r=document.documentElement.style;
  r.setProperty('--pk',c.pk);r.setProperty('--pk2',c.pk2);r.setProperty('--pk3',c.pk3);r.setProperty('--pk4',c.pk4);
  const vl=$('VL');if(vl)vl.setAttribute('fill',c.vc);
  const nl=$('NDL');if(nl)nl.setAttribute('fill',c.nl);
  const d=$('DISP');if(d)d.setAttribute('fill',c.pk);
  ['T1','T2','T3'].forEach((id,i)=>{const el=$(id);if(el)el.setAttribute('fill',c.t[i]);});
}

function loadT(idx,auto=false){
  cur=((idx%TRACKS.length)+TRACKS.length)%TRACKS.length;
  const t=TRACKS[cur];
  applyC(t.color||'pink');
  const vg=$('VG');vg.style.opacity='0';setTimeout(()=>vg.style.opacity='1',340);
  const tn=$('TNAME');tn.textContent=t.title;tn.classList.toggle('mq',t.title.length>16);
  $('TART').textContent=t.artist;
  $('AART').innerHTML='♪';
  $('ltitle').textContent=t.title+' — '+t.artist;
  $('lbox').textContent=t.lyrics||'Lyrics not available.';
  $('PFILL').style.width='0%';$('CT').textContent='0:00';$('TT').textContent='0:00';
  aud.src=t.file;aud.load();
  if(auto||playing){aud.play().then(()=>setPlay(true)).catch(e=>console.warn('Audio error:',e));}
  renderPL();
}

function setPlay(s){
  playing=s;
  $('PBTN').textContent=s?'⏸':'▶';$('PBTN').style.fontSize=s?'18px':'20px';
  $('VG').classList.toggle('sp',s);$('TA').classList.toggle('pl',s);
  renderPL();
}

function togPlay(){
  if(playing){aud.pause();setPlay(false);}
  else{
    if(!aud.src||aud.readyState===0){loadT(cur,true);return;}
    aud.play().then(()=>setPlay(true)).catch(e=>console.warn(e));
  }
}

function prevT(){loadT(cur-1,playing);}
function nextT(){loadT(cur+1,playing);}

aud.addEventListener('timeupdate',()=>{
  if(dragP||!aud.duration)return;
  const p=(aud.currentTime/aud.duration)*100;
  $('PFILL').style.width=p+'%';$('CT').textContent=fmt(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>$('TT').textContent=fmt(aud.duration));
aud.addEventListener('ended',()=>nextT());

// Progress drag
const pb=$('PBAR');
function seekX(cx){if(!aud.duration)return;const r=pb.getBoundingClientRect();const p=Math.max(0,Math.min(1,(cx-r.left)/r.width));aud.currentTime=p*aud.duration;$('PFILL').style.width=(p*100)+'%';$('CT').textContent=fmt(aud.currentTime);}
pb.addEventListener('click',e=>{if(!dragP)seekX(e.clientX);});
$('PTHMB').addEventListener('mousedown',e=>{dragP=true;e.preventDefault();});
$('PTHMB').addEventListener('touchstart',()=>dragP=true,{passive:true});
document.addEventListener('mousemove',e=>{if(dragP)seekX(e.clientX);});
document.addEventListener('touchmove',e=>{if(dragP)seekX(e.touches[0].clientX);},{passive:true});
document.addEventListener('mouseup',()=>dragP=false);
document.addEventListener('touchend',()=>dragP=false);

// Volume
function setVol(v){
  curVol=Math.max(0,Math.min(100,Math.round(+v)));
  aud.volume=curVol/100;
  $('VOLNUM').textContent=curVol+'%';
  $('VFILL').style.width=curVol+'%';
  $('VTHMB').style.left=`calc(${curVol}% - 9px)`;
}
function volClick(e){const r=$('VBAR').getBoundingClientRect();setVol(((e.clientX-r.left)/r.width)*100);}
$('VTHMB').addEventListener('mousedown',e=>{dragV=true;e.preventDefault();});
$('VTHMB').addEventListener('touchstart',()=>dragV=true,{passive:true});
document.addEventListener('mousemove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.clientX-r.left)/r.width)*100);});
document.addEventListener('touchmove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.touches[0].clientX-r.left)/r.width)*100);},{passive:true});
document.addEventListener('mouseup',()=>dragV=false);
document.addEventListener('touchend',()=>dragV=false);

function togLike(){liked=!liked;const b=$('BIGH');b.style.color=liked?'#ff2266':'var(--pk)';b.style.transform=liked?'scale(1.3) rotate(-10deg)':'scale(1)';}

function togS(){$('spanel').classList.toggle('open');renderPL();}
document.addEventListener('click',e=>{if(!e.target.closest('.wbtns'))$('spanel').classList.remove('open');});

function setTheme(t){
  $('btnPk').classList.toggle('on',t==='pink');
  $('btnBl').classList.toggle('on',t==='blue');
  $('btnPu').classList.toggle('on',t==='purple');
  applyC(t);
}

function renderPL(){
  const el=$('spl');el.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='spi'+(i===cur?' on':'');
    d.innerHTML=`<span class="snum">${i+1}</span><span class="stx">${t.title}</span>${i===cur&&playing?'<span class="seq">♪</span>':''}`;
    d.onclick=()=>loadT(i,true);
    el.appendChild(d);
  });
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togPlay();}
  if(e.code==='ArrowRight')nextT();
  if(e.code==='ArrowLeft')prevT();
  if(e.code==='ArrowUp')setVol(curVol+10);
  if(e.code==='ArrowDown')setVol(curVol-10);
});

setVol(80);applyC('pink');loadT(0,false);renderPL();
</script>
