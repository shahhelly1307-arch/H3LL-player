<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>H3LL Music Player</title>
<link rel="icon" href="assets/pink/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pk:#d4607a;--pk2:#f4a7b9;--pk3:#fce8ee;--pk4:#fdf6f8;
  --tx:#4a2535;--tx2:#8a6070;
  --bg:#18091f;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:48px 10px 28px;
  flex-direction:column;
}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) var(--dl,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.85;}}

/* MAIN WINDOW */
.win{
  position:relative;z-index:2;
  width:380px;max-width:95vw;
  background:var(--pk4);
  border:2.5px solid var(--pk2);
  border-radius:16px;
  box-shadow:4px 4px 0 var(--pk),0 0 0 1px rgba(255,255,255,.1),0 20px 60px rgba(0,0,0,.5);
  overflow:hidden;
  margin-top:30px;
}

/* BOW on top */
.bow{position:absolute;top:-28px;left:50%;transform:translateX(-50%);width:64px;height:30px;z-index:10;pointer-events:none;}
.bwl,.bwr{position:absolute;top:4px;width:26px;height:20px;background:var(--pk2);border:2px solid var(--pk);}
.bwl{left:0;border-radius:50% 30% 50% 30%;transform:rotate(-22deg);transform-origin:right center;}
.bwr{right:0;border-radius:30% 50% 30% 50%;transform:rotate(22deg);transform-origin:left center;}
.bwc{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--pk);border:2px solid #fff;}
.bwrl,.bwrr{position:absolute;bottom:-6px;width:9px;height:12px;background:var(--pk2);border-radius:0 0 5px 5px;}
.bwrl{left:50%;margin-left:-6px;transform:rotate(-12deg);}
.bwrr{left:50%;margin-left:1px;transform:rotate(12deg);}

/* TITLEBAR */
.tbar{
  background:var(--pk3);
  padding:7px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--pk2);
}
.ttx{font-family:'Caveat',cursive;font-size:18px;color:var(--tx);letter-spacing:.5px;}
.wbtns{display:flex;gap:5px;align-items:center;position:relative;}
.tbtn{width:22px;height:22px;cursor:pointer;object-fit:contain;transition:transform .15s,filter .12s;}
.tbtn:hover{transform:scale(1.12);filter:brightness(1.1);}
.settings-btn{transition:transform .35s;}
.settings-btn:hover{transform:rotate(90deg)!important;}

/* SETTINGS PANEL */
.spanel{
  position:absolute;top:36px;right:0;z-index:999;
  width:210px;background:#1a0c2a;color:#fff;
  border-radius:10px;padding:13px;
  display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.75);
  border:1px solid rgba(255,255,255,.1);
  max-height:75vh;overflow-y:auto;
}
.spanel.open{display:block;}
.spanel::-webkit-scrollbar{width:3px;}
.spanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);}
.sh4{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:lowercase;margin:10px 0 5px;}
.sh4:first-child{margin-top:0;}
.srow{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.sbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:5px;padding:4px 11px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.sbtn:hover,.sbtn.on{background:var(--pk);border-color:var(--pk);}
.spl{max-height:120px;overflow-y:auto;}
.spl::-webkit-scrollbar{width:3px;}
.spl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.spi{padding:5px 6px;border-radius:5px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.6);display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden;transition:background .1s;}
.spi:hover{background:rgba(255,255,255,.07);}
.spi.on{background:rgba(212,96,122,.28);color:#fff;}
.snum{color:rgba(255,255,255,.22);min-width:14px;font-size:10px;}
.stx{flex:1;overflow:hidden;text-overflow:ellipsis;}
.seq{color:var(--pk2);animation:twinkle .5s steps(2) infinite;}
.lbox{background:rgba(0,0,0,.28);border-radius:7px;padding:9px;max-height:140px;overflow-y:auto;font-size:11px;line-height:1.9;color:rgba(255,255,255,.72);white-space:pre-wrap;}
.lbox::-webkit-scrollbar{width:3px;}
.lbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);}
.ltitle{font-size:11px;color:var(--pk2);font-weight:700;margin-bottom:4px;}

/* ═══════════════════════════════════════
   SCENE — full-width record player image
   ═══════════════════════════════════════ */
.scene{
  position:relative;
  width:100%;
  background:#1a0a28;
  border-bottom:2px solid var(--pk2);
  overflow:hidden;
  /* height set by JS based on image */
  min-height:160px;
  display:flex;align-items:center;justify-content:center;
  transition:background .4s;
}
/* The full background scene image — fills width */
#SCENE_BG{
  width:100%;
  height:auto;
  display:block;
  object-fit:cover;
  opacity:1;
  transition:opacity .3s;
}
/* frame.png (blue) is portrait — centre it instead */
#SCENE_BG.portrait{
  width:auto;
  height:200px;
  display:block;
}

/* ═══════════════════════════════════════
   BOTTOM PANEL
   ═══════════════════════════════════════ */
.bpanel{
  background:var(--pk4);
  padding:12px 14px 14px;
  border-radius:0 0 14px 14px;
}

/* NOW PLAYING ROW */
.nprow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.aart{
  width:54px;height:54px;flex-shrink:0;
  border-radius:8px;
  border:2px solid var(--pk2);
  background:var(--pk3);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  position:relative;
}
.aart img.frame-overlay{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:fill;z-index:2;pointer-events:none;
}
.tdet{flex:1;overflow:hidden;}
.npl{font-family:'Caveat',cursive;font-size:12px;color:var(--tx2);font-style:italic;}
.tnw{overflow:hidden;}
.tnm{font-family:'Caveat',cursive;font-size:21px;font-weight:700;color:var(--tx);white-space:nowrap;display:inline-block;}
.tnm.mq{animation:marquee 10s linear infinite;}
@keyframes marquee{0%{transform:translateX(105%);}100%{transform:translateX(-105%);}}
.tart{font-size:11px;color:var(--tx2);margin-top:1px;}

/* SHUFFLE / REPEAT */
.extra-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:8px;}
.xbtn{width:26px;height:26px;object-fit:contain;cursor:pointer;opacity:.55;transition:opacity .15s,transform .15s;}
.xbtn:hover{opacity:1;transform:scale(1.12);}
.xbtn.on{opacity:1;filter:drop-shadow(0 0 4px var(--pk));}

/* CONTROLS */
.ctrls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;}
.cbtn{
  height:40px;object-fit:contain;cursor:pointer;
  transition:transform .12s,filter .12s;
}
.cbtn:hover{transform:translateY(-2px);filter:brightness(1.15);}
.cbtn:active{transform:translateY(2px);filter:brightness(.9);}
.cbtn.play{height:46px;}

/* PROGRESS */
.prog{margin-bottom:9px;}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.pbar-wrap{flex:1;position:relative;height:16px;display:flex;align-items:center;cursor:pointer;}
.pbar-bg{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:100%;height:10px;
  object-fit:fill;pointer-events:none;border-radius:5px;
}
.pbar{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:100%;height:10px;
  background:transparent;border-radius:5px;
  cursor:pointer;user-select:none;
}
.pfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:5px;width:0%;position:relative;opacity:.75;}
.pthumb{
  position:absolute;right:-7px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;
  background:var(--pk);border:2.5px solid #fff;border-radius:50%;
  box-shadow:0 0 6px rgba(212,96,122,.6);cursor:grab;
}
.trow{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);font-family:monospace;padding:0 2px;}

/* VOLUME */
.volwrap{margin-bottom:10px;}
.voltop{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.vollbl{font-size:10px;color:var(--tx2);font-weight:600;letter-spacing:.5px;}
.volnum{font-size:10px;color:var(--pk);font-weight:700;font-family:monospace;background:rgba(212,96,122,.1);border:1px solid var(--pk2);border-radius:8px;padding:1px 7px;}
.voltrack{position:relative;height:20px;display:flex;align-items:center;gap:8px;}
.vmute{width:20px;height:20px;object-fit:contain;cursor:pointer;opacity:.7;transition:opacity .15s;}
.vmute:hover{opacity:1;}
.volempty{flex:1;height:10px;background:transparent;border-radius:4px;position:relative;cursor:pointer;}
.vol-bg{position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:10px;object-fit:fill;pointer-events:none;border-radius:4px;}
.volfill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pk2));border-radius:4px;width:80%;opacity:.75;}
.volthumb{position:absolute;top:50%;transform:translateY(-50%);width:16px;height:16px;background:var(--pk);border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 7px rgba(212,96,122,.55);cursor:grab;left:calc(80% - 8px);}
.volthumb:hover{transform:translateY(-50%) scale(1.15);}
.vhigh{width:20px;height:20px;object-fit:contain;cursor:pointer;opacity:.7;transition:opacity .15s;}
.vhigh:hover{opacity:1;}

/* HEART */
.bhrow{display:flex;justify-content:center;margin-top:2px;}
.bigh{font-size:26px;color:var(--pk);cursor:pointer;transition:all .2s;filter:drop-shadow(0 2px 8px rgba(212,96,122,.5));line-height:1;}
.bigh:hover{transform:scale(1.18);}
</style>
</head>

let cur=0,playing=false,liked=false,curVol=80,dragP=false,dragV=false;

aud.volume=0.8;
const $=id=>document.getElementById(id);
const fmt=s=>(!s||isNaN(s)||!isFinite(s))?'0:00':`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

// ─── Apply theme ─────────────────────────────────────────
function applyTheme(key){
  curThemeKey=key;
  const t=THEMES[key]||THEMES.pink;
  const r=document.documentElement.style;
  r.setProperty('--pk',t.pk);
  r.setProperty('--pk2',t.pk2);
  r.setProperty('--pk3',t.pk3);
  r.setProperty('--pk4',t.pk4);
  r.setProperty('--bg',t.bg);
  document.body.style.background=t.bg;

  const f=t.folder;

  // Titlebar buttons
  const btns={SETBTN:'settings',MINBTN:'minimizer_button',WINBTN:'window_button',EXITBTN:'exit_button'};
  for(const[id,name]of Object.entries(btns)){const el=$(id);if(el)el.src=`assets/${f}/${name}.png`;}

  // Control buttons
  $('PREVBTN').src=`assets/${f}/backwards_button.png`;
  $('NEXTBTN').src=`assets/${f}/forwards_button.png`;
  $('PBTN').src=playing?`assets/${f}/pause_button.png`:`assets/${f}/play_button.png`;

  // Extra buttons
  const shuf=$('SHUF'),rep=$('REP');
  if(shuf)shuf.src=`assets/${f}/shuffle_button.png`;
  if(rep)rep.src=`assets/${f}/repeat_button.png`;

  // Progress / volume
  const pbg=$('PBAR_BG');if(pbg)pbg.src=`assets/${f}/progress_bar.png`;
  const vbg=$('VBARBG');if(vbg)vbg.src=`assets/${f}/volume_bar_low.png`;
  const mi=$('MUTE_IMG');if(mi)mi.src=`assets/${f}/mute_button.png`;
  const vh=$('VHIGH_IMG');if(vh)vh.src=`assets/${f}/volume_bar_high.png`;

  // Album frame
  const af=$('AART_FRAME');if(af)af.src=`assets/${f}/album_frame.png`;

  // Scene image
  const sceneBg=$('SCENE_BG');
  const sceneEl=$('SCENE');
  if(sceneBg){
    sceneBg.style.opacity='0';
    sceneBg.onload=()=>{ sceneBg.style.opacity='1'; };
    sceneBg.src=t.sceneImg;
    if(t.scenePortrait){
      // portrait card: show at natural height, centred
      sceneBg.classList.add('portrait');
      if(sceneEl) sceneEl.style.cssText=`background:${t.sceneBg};min-height:200px;`;
    } else {
      // landscape: fill full width
      sceneBg.classList.remove('portrait');
      if(sceneEl) sceneEl.style.cssText=`background:${t.sceneBg};`;
    }
    // if already cached
    if(sceneBg.complete) sceneBg.style.opacity='1';
  }
}

// ─── Load track ──────────────────────────────────────────
function loadT(idx,auto=false){
  cur=((idx%TRACKS.length)+TRACKS.length)%TRACKS.length;
  const t=TRACKS[cur];
  applyTheme(t.color||'pink');

  const tn=$('TNAME');
  tn.textContent=t.title;
  tn.classList.toggle('mq',t.title.length>16);
  $('TART').textContent=t.artist;
  $('ltitle').textContent=`${t.title} — ${t.artist}`;
  $('lbox').textContent=t.lyrics||'Lyrics not available.';
  $('PFILL').style.width='0%';
  $('CT').textContent='0:00';
  $('TT').textContent='0:00';

  aud.src=t.file;
  aud.load();
  if(auto||playing) aud.play().then(()=>setPlay(true)).catch(e=>console.error('❌ Audio failed ['+(['','ABORTED','NETWORK','DECODE','NOT_SUPPORTED'][aud.error?.code]||'?')+']:',aud.src));
  renderPL();
}

function setPlay(s){
  playing=s;
  const f=THEMES[curThemeKey].folder;
  $('PBTN').src=s?`assets/${f}/pause_button.png`:`assets/${f}/play_button.png`;
  renderPL();
}

function togPlay(){
  if(playing){aud.pause();setPlay(false);}
  else{
    if(!aud.src||aud.readyState===0){loadT(cur,true);return;}
    aud.play().then(()=>setPlay(true)).catch(()=>{});
  }
}
function prevT(){loadT(cur-1,playing);}
function nextT(){loadT(cur+1,playing);}
function togShuffle(){shuffleOn=!shuffleOn;$('SHUF').classList.toggle('on',shuffleOn);}
function togRepeat(){repeatOn=!repeatOn;aud.loop=repeatOn;$('REP').classList.toggle('on',repeatOn);}

// ─── Audio events ────────────────────────────────────────
aud.addEventListener('timeupdate',()=>{
  if(dragP||!aud.duration)return;
  const p=(aud.currentTime/aud.duration)*100;
  $('PFILL').style.width=p+'%';
  $('CT').textContent=fmt(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>$('TT').textContent=fmt(aud.duration));
aud.addEventListener('ended',()=>{
  if(!repeatOn) shuffleOn?loadT(Math.floor(Math.random()*TRACKS.length),true):nextT();
});
aud.addEventListener('error',()=>{
  const codes=['','ABORTED','NETWORK','DECODE','NOT_SUPPORTED'];
  console.error('❌ Audio failed ['+(codes[aud.error?.code]||'?')+']:', aud.src);
  $('TART').textContent='⚠️ cannot load audio';
});

// ─── Progress drag ───────────────────────────────────────
const pb=$('PBAR');
function seekX(cx){
  if(!aud.duration)return;
  const r=pb.getBoundingClientRect();
  const p=Math.max(0,Math.min(1,(cx-r.left)/r.width));
  aud.currentTime=p*aud.duration;
  $('PFILL').style.width=(p*100)+'%';
  $('CT').textContent=fmt(aud.currentTime);
}
pb.addEventListener('click',e=>{if(!dragP)seekX(e.clientX);});
$('PTHMB').addEventListener('mousedown',e=>{dragP=true;e.preventDefault();});
$('PTHMB').addEventListener('touchstart',()=>dragP=true,{passive:true});
document.addEventListener('mousemove',e=>{if(dragP)seekX(e.clientX);});
document.addEventListener('touchmove',e=>{if(dragP)seekX(e.touches[0].clientX);},{passive:true});
document.addEventListener('mouseup',()=>dragP=false);
document.addEventListener('touchend',()=>dragP=false);

// ─── Volume ──────────────────────────────────────────────
function setVol(v){
  curVol=Math.max(0,Math.min(100,Math.round(+v)));
  aud.volume=curVol/100;
  $('VOLNUM').textContent=curVol+'%';
  $('VFILL').style.width=curVol+'%';
  $('VTHMB').style.left=`calc(${curVol}% - 8px)`;
}
function volClick(e){
  const r=$('VBAR').getBoundingClientRect();
  setVol(((e.clientX-r.left)/r.width)*100);
}
const vt=$('VTHMB');
vt.addEventListener('mousedown',e=>{dragV=true;e.preventDefault();});
vt.addEventListener('touchstart',()=>dragV=true,{passive:true});
document.addEventListener('mousemove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.clientX-r.left)/r.width)*100);});
document.addEventListener('touchmove',e=>{if(!dragV)return;const r=$('VBAR').getBoundingClientRect();setVol(((e.touches[0].clientX-r.left)/r.width)*100);},{passive:true});
document.addEventListener('mouseup',()=>dragV=false);
document.addEventListener('touchend',()=>dragV=false);

// ─── Like ────────────────────────────────────────────────
function togLike(){
  liked=!liked;
  const b=$('BIGH');
  b.style.color=liked?'#ff2266':'var(--pk)';
  b.style.transform=liked?'scale(1.3) rotate(-10deg)':'scale(1)';
}

// ─── Settings panel ──────────────────────────────────────
function togS(){$('spanel').classList.toggle('open');renderPL();}
document.addEventListener('click',e=>{if(!e.target.closest('.wbtns'))$('spanel').classList.remove('open');});

function setTheme(k){
  ['btnPk','btnBl','btnPu'].forEach((id,i)=>$(id).classList.toggle('on',['pink','blue','purple'][i]===k));
  applyTheme(k);
}

function renderPL(){
  const el=$('spl');el.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='spi'+(i===cur?' on':'');
    d.innerHTML=`<span class="snum">${i+1}</span><span class="stx">${t.title}</span>${i===cur&&playing?'<span class="seq">♪</span>':''}`;
    d.onclick=()=>loadT(i,true);
    el.appendChild(d);
  });
}

// ─── Keyboard shortcuts ──────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togPlay();}
  if(e.code==='ArrowRight')nextT();
  if(e.code==='ArrowLeft')prevT();
  if(e.code==='ArrowUp'){e.preventDefault();setVol(curVol+10);}
  if(e.code==='ArrowDown'){e.preventDefault();setVol(curVol-10);}
});

// ─── Init ────────────────────────────────────────────────
setVol(80);
applyTheme('pink');
loadT(0,false);
renderPL();
</script>
</body>
</html>
